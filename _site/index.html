<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 text-gray-900 dark:bg-gray-900 dark:text-white transition">
    <header class="bg-transparent text-white p-6 absolute inset-x-0 top-0 z-20">
        <nav class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">Aaryan Patel</h1>
            <div class="flex items-center space-x-4">
                <ul class="flex space-x-4 text-sm tracking-wide">
                    <li><a href="/about" class="hover:text-blue-200">About</a></li>
                    <li><a href="/projects" class="hover:text-blue-200">Projects</a></li>
                    <li><a href="/contact" class="hover:text-blue-200">Contact</a></li>
                </ul>
                <button id="theme-toggle" class="bg-white/10 text-white px-3 py-1 rounded hover:bg-white/20">🌙</button>
            </div>
        </nav>
    </header>
    <main class="container mx-auto p-6 pt-32 lg:pt-36">
        <section class="neural-hero" id="neural-hero">
  <svg id="neural-svg" class="neural-svg" viewBox="-400 -400 800 800" preserveAspectRatio="xMidYMid slice"></svg>
  <div class="neural-overlay"></div>
  <div class="neural-content">
    <h1 class="neural-title">Aaryan Patel</h1>
    <p class="neural-subtitle">I make websites · I like coding · I want to be an entrepreneur · AI/ML Enthusiast · Open Source Builder</p>
    <div class="neural-links">
      <a href="/about" class="neural-link">About Me</a>
      <a href="/projects" class="neural-link">Projects</a>
      <a href="/contact" class="neural-link secondary">Contact</a>
    </div>
  </div>
</section>

    </main>
    <script src="script.js"></script>
</body>
</html>
