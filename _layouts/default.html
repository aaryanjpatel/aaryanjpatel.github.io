<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 text-gray-900 dark:bg-gray-900 dark:text-white transition">
    <header class="bg-blue-600 text-white p-4 shadow-lg dark:bg-gray-800">
        <nav class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">My Portfolio</h1>
            <div class="flex items-center space-x-4">
                <ul class="flex space-x-4">
                    <li><a href="#about" class="hover:text-blue-200">About</a></li>
                    <li><a href="#projects" class="hover:text-blue-200">Projects</a></li>
                    <li><a href="#contact" class="hover:text-blue-200">Contact</a></li>
                </ul>
                <button id="theme-toggle" class="bg-gray-700 text-white px-3 py-1 rounded hover:bg-gray-600">🌙</button>
            </div>
        </nav>
    </header>
    <main class="container mx-auto p-6">
        {{ content }}
    </main>
    <script src="script.js"></script>
</body>
</html>
